# HTTPRoute da UI do ArgoCD.
#
# Fica no namespace "argocd" (mesmo do Service argocd-server), então o
# backendRef é local — sem necessidade de ReferenceGrant.
# Aponta para o Gateway em "tools".
#
# O argocd-server roda com server.insecure=true (ver gitops/install/
# argocd-cmd-params-cm.yaml), então serve HTTP na porta 80 — sem duplo-TLS.
#
# O hostname muda por ambiente e é ajustado no overlay.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  # group/kind/weight são declarados explicitamente (mesmo sendo defaults da
  # API) para que o manifesto bata exatamente com o objeto armazenado. Sem isso,
  # o API server preenche os defaults e o ArgoCD (com ServerSideApply) enxerga
  # diferença, deixando a Application eternamente OutOfSync.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dito-gateway
      namespace: tools
      sectionName: http
  hostnames:
    - PLACEHOLDER_ARGOCD_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
