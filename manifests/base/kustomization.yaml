apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base comum aos dois ambientes. Os overlays (staging/production) fazem
# os ajustes específicos por patch.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - externalsecret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

# Rótulo comum a todos os recursos. includeSelectors=false para não mexer nos
# selectors (que são imutáveis num Deployment já existente).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: kustomize
