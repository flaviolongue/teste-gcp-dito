# O External Secrets Operator (ESO) sincroniza secrets do GCP Secret Manager
# para um Secret nativo do Kubernetes. A app consome o Secret resultante como
# variáveis de ambiente — nunca lê o Secret Manager diretamente.
#
# O SecretStore usa a mesma KSA (Workload Identity), então o ESO acessa o
# Secret Manager com a GSA do workload, sem chaves.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: apps
spec:
  provider:
    gcpsm:
      # O projeto muda por ambiente; ajustado no overlay via patch.
      projectID: PLACEHOLDER_PROJECT
      auth:
        workloadIdentity:
          clusterLocation: southamerica-east1
          clusterName: PLACEHOLDER_CLUSTER
          serviceAccountRef:
            name: dito-api
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dito-api-secrets
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    # Nome do Secret Kubernetes gerado, consumido pelo Deployment.
    name: dito-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        # secret_id no Secret Manager; o prefixo do ambiente é aplicado no overlay.
        key: PLACEHOLDER_PREFIX-db-password
    - secretKey: APP_API_KEY
      remoteRef:
        key: PLACEHOLDER_PREFIX-app-api-key
