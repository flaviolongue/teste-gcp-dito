apiVersion: v1
kind: ServiceAccount
metadata:
  name: dito-api
  namespace: apps
  annotations:
    # Liga esta KSA à GSA do workload via Workload Identity.
    # O e-mail da GSA muda por ambiente (projeto), então é ajustado no overlay.
    iam.gke.io/gcp-service-account: PLACEHOLDER@PROJECT.iam.gserviceaccount.com
