apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dito-api
  namespace: apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dito-api
  minReplicas: 2 # nunca abaixo de 2, para manter HA.
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Evita flapping: espera 5 min de estabilidade antes de reduzir.
      stabilizationWindowSeconds: 300
