apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dito-api
  namespace: apps
spec:
  # Garante que pelo menos 1 réplica siga rodando durante disrupções
  # voluntárias (drain de nó, upgrade do cluster).
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dito-api
