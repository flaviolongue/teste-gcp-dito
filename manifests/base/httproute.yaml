# HTTPRoute da aplicação (Gateway API).
#
# Fica no namespace "apps" — o mesmo do Service — para que o backendRef seja
# local (backendRef cross-namespace exigiria um ReferenceGrant).
# O parentRef aponta para o Gateway em "tools" (cross-namespace é permitido
# porque o Gateway declara allowedRoutes.namespaces.from: All).
#
# O hostname muda por ambiente e é ajustado no overlay.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dito-api
  namespace: apps
spec:
  # group/kind/weight explícitos (mesmo sendo defaults da API) para o manifesto
  # bater exatamente com o objeto armazenado e não gerar drift no ArgoCD.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dito-gateway
      namespace: tools
      sectionName: http
  hostnames:
    - PLACEHOLDER_APP_HOSTNAME
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: dito-api
          port: 80
          weight: 1
