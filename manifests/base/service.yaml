apiVersion: v1
kind: Service
metadata:
  name: dito-api
  namespace: dito-app
  labels:
    app.kubernetes.io/name: dito-api
spec:
  # ClusterIP: acesso apenas interno ao cluster, para consumo por outros
  # serviços da Dito (requisito de "acesso interno"). Não é exposto à internet.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dito-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
