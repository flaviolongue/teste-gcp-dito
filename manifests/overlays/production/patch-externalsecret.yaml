---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: dito-app
spec:
  provider:
    gcpsm:
      projectID: dito-production
      auth:
        workloadIdentity:
          clusterLocation: southamerica-east1
          clusterName: dito-production-gke
          serviceAccountRef:
            name: dito-api
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dito-api-secrets
  namespace: dito-app
spec:
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: dito-production-db-password
    - secretKey: APP_API_KEY
      remoteRef:
        key: dito-production-app-api-key
