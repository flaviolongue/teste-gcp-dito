# Aponta o SecretStore e o ExternalSecret para o projeto/cluster e os secrets
# de staging.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: dito-app
spec:
  provider:
    gcpsm:
      projectID: dito-staging
      auth:
        workloadIdentity:
          clusterLocation: southamerica-east1
          clusterName: dito-staging-gke
          serviceAccountRef:
            name: dito-api
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dito-api-secrets
  namespace: dito-app
spec:
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: dito-staging-db-password
    - secretKey: APP_API_KEY
      remoteRef:
        key: dito-staging-app-api-key
