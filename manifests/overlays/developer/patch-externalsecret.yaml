# Aponta o SecretStore e o ExternalSecret para o projeto/cluster e os secrets
# de developer. Atenção: o cluster developer é ZONAL, então clusterLocation é a
# zona (southamerica-east1-a), não a região.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: dito-app
spec:
  provider:
    gcpsm:
      projectID: project-4a372108-be7a-4159-966
      auth:
        workloadIdentity:
          clusterLocation: southamerica-east1-a
          clusterName: dito-developer-gke
          serviceAccountRef:
            name: dito-api
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dito-api-secrets
  namespace: dito-app
spec:
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: dito-developer-db-password
    - secretKey: APP_API_KEY
      remoteRef:
        key: dito-developer-app-api-key
