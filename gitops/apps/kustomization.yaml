apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Recursos que o ArgoCD vai gerenciar: o AppProject e as duas Applications.
# Aplicado DEPOIS do install (os CRDs Application/AppProject já precisam existir).
namespace: argocd

resources:
  - appproject.yaml
  - appproject-addons.yaml
  - application-external-secrets.yaml
  - application-staging.yaml
  - application-production.yaml
