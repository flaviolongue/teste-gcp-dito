# AppProject dos add-ons de cluster (ESO). Add-ons instalam CRDs e recursos
# cluster-scoped e vêm de repositórios Helm externos.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Add-ons de cluster (ESO, etc.) via GitOps"
  sourceRepos:
    - https://charts.external-secrets.io
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
