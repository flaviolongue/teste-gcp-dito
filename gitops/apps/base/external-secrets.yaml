# External Secrets Operator gerenciado pelo ArgoCD (Application do tipo Helm).
# Comum a todos os clusters. sync-wave 0: instala antes da app (wave 1), que
# depende dos CRDs do ESO.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: cluster-addons
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    # Ferramentas de cluster vivem no namespace "tools".
    namespace: tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
