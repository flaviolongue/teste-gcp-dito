# External Secrets Operator gerenciado pelo ArgoCD (Application do tipo Helm).
# Em vez de `helm install` imperativo, o ArgoCD instala e mantém o ESO
# sincronizado com esta declaração — GitOps de ponta a ponta.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: cluster-addons
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      parameters:
        - name: installCRDs
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
