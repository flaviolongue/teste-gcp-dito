# AppProject para ADD-ONS de cluster gerenciados via GitOps (ex.: External
# Secrets Operator). Separado do project da aplicação porque add-ons instalam
# CRDs e recursos cluster-scoped, e vêm de repositórios Helm externos.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  description: "Add-ons de cluster (ESO, etc.) via GitOps"
  sourceRepos:
    - https://charts.external-secrets.io
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  # Add-ons precisam criar CRDs e outros recursos cluster-scoped.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
