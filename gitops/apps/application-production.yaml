# Application de PRODUCTION.
# Sincronização MANUAL (com aprovação): o ArgoCD detecta a mudança no Git e
# marca a Application como "OutOfSync", mas NÃO aplica sozinho. Um operador
# precisa clicar em "Sync" na UI/CLI do ArgoCD para promover.
#
# A ausência do bloco `syncPolicy.automated` é o que torna o sync manual.
# A aprovação humana é o gate de produção exigido pelo desafio.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dito-api-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
  annotations:
    # Notifica o time quando há algo pendente de aprovação para promover.
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: devops
spec:
  project: dito-internal-api
  source:
    repoURL: https://github.com/dito/desafio-devops.git
    targetRevision: main
    path: manifests/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: dito-app
  syncPolicy:
    # Sem `automated`: sync só acontece por ação humana (aprovação).
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
