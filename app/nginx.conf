# Configuração do nginx da aplicação.
# Escuta na porta 8080 (não-privilegiada) para permitir rodar como não-root.

server {
    listen       8080;
    server_name  _;

    # pid e arquivos temporários em /tmp para funcionar com filesystem read-only.
    access_log   /dev/stdout;
    error_log    /dev/stderr;

    # Endpoint de health usado pelos probes (liveness/readiness) do Kubernetes.
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Página principal da aplicação.
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }
}
