name: app-build-deploy

# Dispara apenas quando há alterações em app/.
on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app.yml"

permissions:
  contents: write # para dar commit da nova tag no overlay (GitOps).
  id-token: write # OIDC: troca o token do GitHub por credencial GCP (keyless).

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: southamerica-east1
  IMAGE: dito-internal-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # Tag imutável = SHA curto do commit. Nunca "latest" para deploy.
      - name: Definir tag da imagem
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Autenticação KEYLESS: o GitHub emite um token OIDC e a GCP o troca por
      # credenciais de curta duração. Nenhuma chave JSON existe neste fluxo.
      - name: Autenticar no GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.APP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para o Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build da imagem
        run: docker build -t "${{ vars.ARTIFACT_REGISTRY }}/$IMAGE:${{ steps.meta.outputs.tag }}" ./app

      # Em PRs apenas valida o build; o push só ocorre em merge para main.
      - name: Push da imagem
        if: github.event_name == 'push'
        run: docker push "${{ vars.ARTIFACT_REGISTRY }}/$IMAGE:${{ steps.meta.outputs.tag }}"

  # Fecha o loop GitOps: atualiza a tag no overlay e dá commit. O ArgoCD
  # (sync automático) aplica a mudança no cluster.
  bump-developer:
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Usa o GITHUB_TOKEN padrão (permissions.contents: write) — sem PAT.
      # Commits feitos com ele não disparam workflows, evitando loop.
      - uses: actions/checkout@v4

      - name: Instalar kustomize
        run: |
          curl -sfLo /tmp/k.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/k.tar.gz -C /usr/local/bin

      - name: Atualizar tag da imagem no overlay de developer
        working-directory: manifests/overlays/developer
        run: kustomize edit set image "$IMAGE=${{ vars.ARTIFACT_REGISTRY }}/$IMAGE:${{ needs.build-push.outputs.tag }}"

      - name: Commit da promoção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/developer/kustomization.yaml
          git commit -m "chore(developer): deploy ${IMAGE}:${{ needs.build-push.outputs.tag }}" || {
            echo "Nenhuma mudanca de tag para commitar"; exit 0;
          }
          git push
