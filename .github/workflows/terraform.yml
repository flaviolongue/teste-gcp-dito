name: terraform

# Dispara apenas quando há alterações em iac/.
on:
  pull_request:
    paths:
      - "iac/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "iac/**"
      - ".github/workflows/terraform.yml"

# Autenticação keyless no GCP via Workload Identity Federation (sem chave JSON).
permissions:
  contents: read
  id-token: write # necessário para o OIDC token do WIF.
  pull-requests: write # para comentar o plan no PR.

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false # nunca cancelar um apply em andamento.

env:
  TF_VERSION: "1.9.5"

jobs:
  # ---------------------------------------------------------------------------
  # PR: fmt + validate (os 3 ambientes) + plan (developer). Não aplica nada.
  #
  # O `validate` roda para developer, staging e production — demonstra que os
  # três estão íntegros. O `plan` real roda só no developer, porque staging e
  # production apontam para projetos GCP que ainda não existem neste teste
  # single-project (num cenário multi-projeto, o plan rodaria nos três).
  # ---------------------------------------------------------------------------
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [developer, staging, production]
    defaults:
      run:
        working-directory: iac/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: iac

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SERVICE_ACCOUNT }}

      # validate funciona offline (sem state/credencial) para os três ambientes.
      - name: terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

      # plan real apenas do developer (único ambiente provisionado neste teste).
      - name: terraform plan
        id: plan
        if: matrix.environment == 'developer'
        run: |
          terraform init -reconfigure -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
          terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comentar plan no PR
        if: matrix.environment == 'developer'
        uses: actions/github-script@v7
        env:
          PLAN_STATUS: ${{ steps.plan.outcome }}
        with:
          script: |
            const { execSync } = require('child_process');
            let summary = '';
            try {
              summary = execSync('terraform show -no-color tfplan', {
                cwd: 'iac/environments/developer'
              }).toString().split('\n').filter(l => /^Plan:|No changes/.test(l)).join('\n');
            } catch (e) { summary = '(sem resumo)'; }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan — \`developer\`: \`${process.env.PLAN_STATUS}\`\n\`\`\`\n${summary}\n\`\`\``
            });

      - name: Falhar se o plan falhou
        if: matrix.environment == 'developer' && steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Merge em main: apply nos três ambientes.
  #
  # O GATE de aprovação vem do `environment:` abaixo, combinado com os GitHub
  # Environments (Settings → Environments → Required reviewers):
  #   - developer  -> sem proteção        -> aplica automaticamente
  #   - production -> required reviewers   -> ESPERA aprovação manual (por spec)
  #   - staging    -> required reviewers   -> aqui gated apenas para o teste não
  #                  tentar aplicar num projeto que ainda não existe; num cenário
  #                  multi-projeto real, staging seria auto (sem reviewer).
  #
  # Ou seja, a aprovação manual obrigatória antes do apply em production é
  # imposta pelo próprio GitHub, não por um passo no YAML.
  #
  # Neste teste single-project, só o developer aplica de verdade.
  # ---------------------------------------------------------------------------
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # developer antes de staging/production.
      matrix:
        environment: [developer, staging, production]
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: iac/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SERVICE_ACCOUNT }}

      - name: terraform init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: terraform apply
        run: terraform apply -auto-approve -input=false
