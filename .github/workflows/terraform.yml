name: terraform

# Dispara apenas quando há alterações em iac/.
on:
  pull_request:
    paths:
      - "iac/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "iac/**"
      - ".github/workflows/terraform.yml"

# Autenticação keyless no GCP via Workload Identity Federation (sem chave JSON).
permissions:
  contents: read
  id-token: write # necessário para o OIDC token do WIF.
  pull-requests: write # para comentar o plan no PR.

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false # nunca cancelar um apply em andamento.

env:
  TF_VERSION: "1.9.5"

jobs:
  # ---------------------------------------------------------------------------
  # Descobre QUAIS ambientes foram afetados, para não rodar os três à toa.
  #
  # Regra:
  #   - mudou algo compartilhado (iac/modules/**, iac/bootstrap/** ou o próprio
  #     workflow) -> afeta TODOS os ambientes;
  #   - mudou só iac/environments/<env>/** -> afeta APENAS aquele ambiente.
  #
  # Assim, uma mudança só no developer não dispara plan/apply de staging/prod.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.detect.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # precisa de histórico para o diff.

      - id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch -q origin "${{ github.base_ref }}"
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi
          # Se a base for inválida (ex.: primeiro push), compara com o pai.
          if ! git rev-parse -q --verify "$BASE^{commit}" >/dev/null; then
            BASE="HEAD^"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Arquivos alterados:"; echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^iac/(modules|bootstrap)/|^\.github/workflows/terraform\.yml'; then
            # Mudança compartilhada -> todos os ambientes.
            ENVS='["developer","staging","production"]'
          else
            SEL=()
            for e in developer staging production; do
              if echo "$CHANGED" | grep -qE "^iac/environments/${e}(-bootstrap)?/"; then
                SEL+=("\"$e\"")
              fi
            done
            ENVS="[$(IFS=,; echo "${SEL[*]}")]"
          fi
          echo "Ambientes afetados: $ENVS"
          echo "envs=$ENVS" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # PR: fmt + validate + plan, apenas nos ambientes afetados. Não aplica nada.
  #
  # O plan real roda só no developer (único ambiente provisionado neste teste);
  # para staging/production faz validate (seus projetos GCP ainda não existem).
  # ---------------------------------------------------------------------------
  plan:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.envs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.changes.outputs.envs) }}
    defaults:
      run:
        working-directory: iac/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: iac

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SERVICE_ACCOUNT }}

      - name: terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color

      - name: terraform plan
        id: plan
        if: matrix.environment == 'developer'
        run: |
          terraform init -reconfigure -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -input=false
          terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comentar plan no PR
        if: matrix.environment == 'developer'
        uses: actions/github-script@v7
        env:
          PLAN_STATUS: ${{ steps.plan.outcome }}
        with:
          script: |
            const { execSync } = require('child_process');
            let summary = '';
            try {
              summary = execSync('terraform show -no-color tfplan', {
                cwd: 'iac/environments/developer'
              }).toString().split('\n').filter(l => /^Plan:|No changes/.test(l)).join('\n');
            } catch (e) { summary = '(sem resumo)'; }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan — \`developer\`: \`${process.env.PLAN_STATUS}\`\n\`\`\`\n${summary}\n\`\`\``
            });

      - name: Falhar se o plan falhou
        if: matrix.environment == 'developer' && steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Merge em main: apply, apenas nos ambientes afetados.
  #
  # O GATE de aprovação vem do `environment:` combinado com os GitHub
  # Environments (Settings → Environments → Required reviewers):
  #   - developer  -> sem proteção        -> aplica automaticamente
  #   - production -> required reviewers   -> ESPERA aprovação manual (por spec)
  #   - staging    -> required reviewers   -> gated só para este teste não tentar
  #                  aplicar num projeto que ainda não existe; em multi-projeto
  #                  real seria auto (sem reviewer).
  #
  # A aprovação manual antes do apply em production é imposta pelo GitHub, não
  # por um passo no YAML.
  # ---------------------------------------------------------------------------
  apply:
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.envs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        environment: ${{ fromJson(needs.changes.outputs.envs) }}
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: iac/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SERVICE_ACCOUNT }}

      - name: terraform init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: terraform apply
        run: terraform apply -auto-approve -input=false
